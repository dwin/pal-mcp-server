name: Semantic Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    concurrency: release

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --frozen

      - name: Verify tests pass
        run: |
          uv run pytest tests/ -v --ignore=simulator_tests/ -m "not integration"

      - name: Run semantic release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          uv run semantic-release version
          uv run semantic-release publish
          
      - name: Sync version to config.py
        run: |
          # toml is now in dev dependencies
          uv run scripts/sync_version.py
          if git diff --quiet config.py; then
            echo "No version changes in config.py"
          else
            git add config.py
            git commit -m "chore: sync version to config.py [skip ci]"
            git push
          fi

      - name: Upload build artifacts to release
        if: hashFiles('dist/*') != ''
        run: |
          # Get the latest release tag
          LATEST_TAG=$(gh release list --limit 1 --json tagName --jq '.[0].tagName')
          if [ ! -z "$LATEST_TAG" ]; then
            echo "Uploading artifacts to release $LATEST_TAG"
            gh release upload "$LATEST_TAG" dist/* --clobber
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}